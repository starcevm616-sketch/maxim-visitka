<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Максим — Веб-разработчик</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 4px solid #667eea;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }
        .profession {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            color: white;
            padding: 14px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
            margin: 8px auto;
            width: 100%;
            max-width: 280px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-call {
            background: #667eea;
        }
        .btn-call:hover {
            background: #764ba2;
        }
        .btn-telegram {
            background: #0088cc;
        }
        .btn-telegram:hover {
            background: #006699;
        }
        .btn-whatsapp {
            background: #25d366;
        }
        .btn-whatsapp:hover {
            background: #1da851;
        }
        .socials {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .socials a {
            color: #667eea;
            font-size: 28px;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .socials a:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- ФОТО -->
        <div class="avatar">
            <img src="https://i.pravatar.cc/150?img=11" alt="Максим">
        </div>
        
        <!-- ИМЯ -->
        <h1>Максим</h1>
        
        <!-- ПРОФЕССИЯ -->
        <div class="profession">Веб-разработчик</div>
        
        <!-- ОПИСАНИЕ -->
        <p class="desc">
            Создаю стильные сайты-визитки для бизнеса и личного бренда.<br>
            Быстро, качественно, с душой ❤️
        </p>
        
        <!-- КНОПКА ПОЗВОНИТЬ -->
        <a href="tel:+79884015704" class="btn btn-call">📞 Позвонить</a>
        
        <!-- КНОПКА TELEGRAM -->
        <a href="https://t.me/asyzs" target="_blank" class="btn btn-telegram">✈️ Telegram</a>
        
        <!-- КНОПКА WHATSAPP -->
        <a href="https://wa.me/79884015704" target="_blank" class="btn btn-whatsapp">💬 WhatsApp</a>
        
        <!-- СОЦСЕТИ -->
        <div class="socials">
            <a href="https://t.me/asyzs" target="_blank">📱</a>
            <a href="mailto:starcevm616@gmail.com">📧</a>
            <a href="https://wa.me/79884015704" target="_blank">💬</a>
        </div>
    </div>
</body>
</html>
